<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PokeMaths">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/ultra-ball.png">
    <title>PokeMaths V17.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Sniglet&display=swap" rel="stylesheet">
    <style>
        :root { --font-main: 'Sniglet', cursive; --font-title: 'Luckiest Guy', cursive; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #1e3799; color: #fff; height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }
        
        #overlay, #end-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 15px; }
        #hit-flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 2500; }
        .diff-row { display: flex; justify-content: center; gap: 10px; width: 100%; max-width: 500px; margin-top: 15px; }
        .diff-card { flex: 1; background: #fff; color: #333; padding: 15px 5px; border-radius: 15px; border: 4px solid #ffcb05; display: flex; flex-direction: column; align-items: center; cursor: pointer; box-shadow: 0 6px 0 #d4a017; }
        .diff-card img { width: 100%; max-width: 80px; height: auto; pointer-events: none; }

        #arena { height: 35vh; display: flex; justify-content: center; align-items: stretch; gap: 8px; padding: 5px; opacity: 0; transition: opacity 0.5s; }
        .card-slot { flex: 1; max-width: 280px; display: flex; flex-direction: column; }
        .team-tracker { display: flex; justify-content: center; gap: 6px; margin-bottom: 4px; height: 24px; }
        .ball-proper { width: 22px; height: 22px; background: white; border-radius: 50%; border: 2px solid #333; position: relative; overflow: hidden; }
        .ball-proper::before { content: ""; position: absolute; top: 0; width: 100%; height: 50%; background: #eb4d4b; border-bottom: 2px solid #333; }
        .ball-proper.spent { filter: grayscale(1) brightness(0.2); opacity: 0.5; }
        
        .card { flex: 1; display: flex; flex-direction: column; border-radius: 12px; padding: 4px; border: 4px solid #f1c40f; background: #fff; position: relative; overflow: hidden; transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tcg-hp-container { flex-shrink: 0; background: rgba(0,0,0,0.85); border-radius: 8px; padding: 4px 8px; border: 1.5px solid #fff; margin-bottom: 2px; }
        .hp-header { display: flex; justify-content: space-between; align-items: center; }
        .pokemon-name { font-family: var(--font-title); font-size: 0.7rem; color: #ffcb05; }
        .tcg-hp-text { font-family: 'Arial Black', sans-serif; font-size: 0.95rem; color: #fff; }
        .hp-bar-outer { width: 100%; height: 10px; background: #333; border-radius: 5px; border: 1px solid #fff; overflow: hidden; }
        .hp-bar-inner { height: 100%; width: 100%; background: #2ecc71; transition: width 0.5s; }
        .image-window { flex: 1; min-height: 0; background: rgba(255,255,255,0.8); border-radius: 6px; display: flex; align-items: center; justify-content: center; margin: 2px 0; border: 1px solid #333; }
        .pokemon-img { max-height: 95%; max-width: 95%; object-fit: contain; }
        .move-list { flex-shrink: 0; background: rgba(0,0,0,0.8); padding: 4px 6px; border-radius: 8px; border: 1px solid #fff; min-height: 38px; }
        .move-row { display: flex; justify-content: space-between; color: #fff; font-weight: bold; font-size: 0.58rem; }
        
        #controls-area { height: 46vh; background: linear-gradient(180deg, #0984e3 0%, #2980b9 100%); border-top: 5px solid #f1c40f; display: flex; flex-direction: row; align-items: stretch; justify-content: center; padding: 10px; border-radius: 25px 25px 0 0; gap: 10px; }
        #potion-belt { display: flex; flex-direction: column; gap: 8px; width: 95px; flex-shrink: 0; }
        .potion-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; border: 3px solid #fff; color: white; text-align: center; box-shadow: 0 4px 0 rgba(0,0,0,0.3); cursor: pointer; }
        .p-reg { background: #9b59b6; } .p-super { background: #f1c40f; color: #333 !important; } .p-hyper { background: #e91e63; }
        .potion-btn span { font-size: 1.6rem; line-height: 1; }
        .potion-text { font-size: 0.55rem; font-weight: 900; }
        .potion-val { font-size: 0.65rem; font-weight: 900; color: #fff; text-shadow: 1px 1px #000; }
        .p-super .potion-val { color: #333; text-shadow: none; }
        
        #numpad-wrapper { flex: 1; display: flex; flex-direction: column; max-width: 450px; }
        #display-answer { background: #fff; font-size: 1.8rem; width: 100%; border-radius: 8px; height: 42px; color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid #f39c12; margin-bottom: 6px; }
        .pad-and-submit { display: flex; flex-direction: row; flex: 1; gap: 10px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; flex: 3; }
        .num-btn { background: #f5f6fa; border: none; border-radius: 12px; font-size: 1.6rem; font-weight: bold; color: #2f3640; cursor: pointer; box-shadow: 0 4.5px 0 #bdc3c7; }
        
        .btn-submit { flex: 1.2; background: #eb4d4b; border-radius: 20px; border: 5px solid white; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 0 #c0392b; }
        .pokeball-icon { width: 52px; height: 52px; background: white; border-radius: 50%; border: 3.5px solid #333; position: relative; overflow: hidden; animation: pulsePoke 2s infinite; }
        .pokeball-icon::before { content: ""; position: absolute; top: 0; width: 100%; height: 50%; background: #eb4d4b; border-bottom: 3.5px solid #333; }
        .pokeball-icon::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 16px; height: 14px; background: white; border: 3.5px solid #333; border-radius: 50%; z-index: 2; }
        
        .lunge-right { transform: translateX(80px) scale(1.15) rotate(5deg) !important; }
        .lunge-left { transform: translateX(-80px) scale(1.15) rotate(-5deg) !important; }
        .damage-shake { animation: shakeFx 0.4s; }
        @keyframes shakeFx { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-20px); } 75% { transform: translateX(20px); } }
        .fainted { animation: faintFx 0.8s ease-in forwards; }
        @keyframes faintFx { 100% { transform: translateY(500px) rotate(45deg); opacity: 0; } }
        @keyframes flashEffect { 0% { opacity: 0.8; } 100% { opacity: 0; } }
        .active-flash { animation: flashEffect 0.3s ease-out forwards; }
        @keyframes pulsePoke { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        .firework { position: absolute; width: 6px; height: 6px; border-radius: 50%; animation: explode 1s ease-out forwards; pointer-events: none; z-index: 3000; }
        @keyframes explode { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(40); opacity: 0; } }

        #question-area { height: 16vh; display: flex; align-items: stretch; justify-content: center; padding: 4px; gap: 6px; }
        #question { flex: 2; background: #fff; border: 4px solid #444; border-radius: 15px; display: flex; align-items: center; justify-content: center; padding: 6px; color: #000; font-size: 0.9rem; text-align: center; font-weight: 900; }
        #sum-box { flex: 0 0 115px; background: #fff; border: 4px solid #e74c3c; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.8rem; color: #333; position: relative; }
        .sum-symbol { position: absolute; left: 10px; color: #e74c3c; font-size: 2rem; }
    </style>
</head>
<body>
    <div id="hit-flash"></div>
    <div id="overlay">
        <h1 style="font-family: var(--font-title); font-size: 3rem; color: #ffcb05; text-shadow: 4px 4px #2a75bb;">POKEMATHS</h1>
        <div class="diff-row">
            <div class="diff-card" onclick="startGame('easy')"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png">EASY</div>
            <div class="diff-card" onclick="startGame('medium')"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/5.png">MED</div>
            <div class="diff-card" onclick="startGame('hard')"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png">HARD</div>
        </div>
    </div>
    <div id="end-screen" style="display:none;">
        <h1 id="end-title" style="font-family: var(--font-title); font-size: 3.5rem; color: #ffcb05; text-shadow: 4px 4px #2a75bb;"></h1>
        <p id="end-msg" style="font-size: 1.5rem; margin-bottom: 20px; color: #fff;"></p>
        <button class="num-btn" style="width: 250px; padding: 20px; background: #2ecc71; color: white;" onclick="location.reload()">PLAY AGAIN!</button>
    </div>
    <div id="arena">
        <div class="card-slot">
            <div id="p-team" class="team-tracker"><div class="ball-proper"></div><div class="ball-proper"></div><div class="ball-proper"></div></div>
            <div class="card" id="p-card">
                <div class="tcg-hp-container"><div class="hp-header"><span id="p-name" class="pokemon-name">---</span><span id="p-hp-text" class="tcg-hp-text">200</span></div><div class="hp-bar-outer"><div id="p-fill" class="hp-bar-inner"></div></div></div>
                <div class="image-window"><img id="p-img" class="pokemon-img"></div>
                <div id="p-moves" class="move-list"></div>
            </div>
        </div>
        <div class="card-slot">
            <div id="o-team" class="team-tracker"><div class="ball-proper"></div><div class="ball-proper"></div><div class="ball-proper"></div></div>
            <div class="card" id="o-card">
                <div class="tcg-hp-container"><div class="hp-header"><span id="o-name" class="pokemon-name">---</span><span id="o-hp-text" class="tcg-hp-text">200</span></div><div class="hp-bar-outer"><div id="o-fill" class="hp-bar-inner"></div></div></div>
                <div class="image-window"><img id="o-img" class="pokemon-img"></div>
                <div id="o-moves" class="move-list"></div>
            </div>
        </div>
    </div>
    <div id="timer-container" style="width: 95%; height: 12px; background: #222; margin: 4px auto; border-radius: 10px; border: 2px solid #fff; overflow: hidden;"><div id="timer-fill" style="height: 100%; width: 100%; background: #00ffcc;"></div></div>
    <div id="question-area">
        <div id="question">Ready?</div>
        <div id="sum-box">
            <span id="sum-op" class="sum-symbol"></span>
            <div style="display:flex; width:100%; justify-content:flex-end; padding-right:15px;"><span id="sum-v1"></span></div>
            <div style="display:flex; width:100%; justify-content:flex-end; padding-right:15px;"><span id="sum-v2"></span></div>
        </div>
    </div>
    <div id="controls-area">
        <div id="potion-belt">
            <div class="potion-btn p-reg" onclick="useHeal('Potion')"><span>🧪</span><div class="potion-text">POTION</div><div class="potion-val" id="val-reg"></div></div>
            <div class="potion-btn p-super" onclick="useHeal('Super Potion')"><span>🧴</span><div class="potion-text">SUPER</div><div class="potion-val" id="val-sup"></div></div>
            <div class="potion-btn p-hyper" onclick="useHeal('Hyper Potion')"><span>⚗️</span><div class="potion-text">HYPER</div><div class="potion-val" id="val-hyp"></div></div>
        </div>
        <div id="numpad-wrapper">
            <div id="display-answer"></div>
            <div class="pad-and-submit">
                <div class="numpad">
                    <button class="num-btn" onclick="press(1)">1</button><button class="num-btn" onclick="press(2)">2</button><button class="num-btn" onclick="press(3)">3</button>
                    <button class="num-btn" onclick="press(4)">4</button><button class="num-btn" onclick="press(5)">5</button><button class="num-btn" onclick="press(6)">6</button>
                    <button class="num-btn" onclick="press(7)">7</button><button class="num-btn" onclick="press(8)">8</button><button class="num-btn" onclick="press(9)">9</button>
                    <button class="num-btn" onclick="clearAns()" style="background:#7f8c8d; color:#fff">C</button><button class="num-btn" onclick="press(0)">0</button>
                </div>
                <div onclick="submit()" class="btn-submit"><div class="pokeball-icon"></div></div>
            </div>
        </div>
    </div>
<script>
    let audioCtx, voice = window.speechSynthesis, timerId, difficulty, timeLeft = 20;
    const icons = ["🔥", "💧", "🌿", "⚡", "👁️", "🐲", "👊", "❄️"], pre = ["THUNDER", "FIRE", "HYDRO", "MYSTIC", "SOLAR", "DRAGON", "ICE", "SHADOW"], suf = ["BLAST", "PUNCH", "SLASH", "BEAM", "STRIKE", "KICK", "WAVE", "STORM"];
    const typeBgs = { fire: "#eb3b5a", water: "#4b7bec", grass: "#20bf6b", electric: "#f7b731", psychic: "#a55eea", dragon: "#8854d0", ice: "#45aaf2", bug: "#26de81" };
    let playerTeam = [], oppTeam = [], pIdx = 0, oIdx = 0, gameState = { active: false, mode: 'atk', answer: 0, rawHealingResult: 0 };
    let curHeals = { reg: 20, sup: 45, hyp: 71 };

    function initAudio() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function speak(txt) { 
        voice.cancel(); 
        // Force removal of icons and any extra whitespace for clean narration
        const cleanText = txt.replace(/[\u{1F300}-\u{1F9FF}]/gu, "").replace(/[🔥💧🌿⚡👁️🐲👊❄️]/gu, "").trim(); 
        const msg = new SpeechSynthesisUtterance(cleanText); 
        msg.rate = 1.0; 
        voice.speak(msg); 
    }

    function playSfx(freqs, type, volume = 0.1) {
        if (!audioCtx) return; const now = audioCtx.currentTime;
        freqs.forEach((f, i) => { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = type || 'sine'; o.frequency.setValueAtTime(f, now + (i*0.1)); g.gain.setValueAtTime(volume, now + (i*0.1)); g.gain.exponentialRampToValueAtTime(0.0001, now + (i*0.1) + 0.3); o.connect(g); g.connect(audioCtx.destination); o.start(now + (i*0.1)); o.stop(now + (i*0.1) + 0.3); });
    }

    function triggerImpact() { const f = document.getElementById('hit-flash'); f.classList.remove('active-flash'); void f.offsetWidth; f.classList.add('active-flash'); }

    function rollHeals() {
        curHeals.reg = [20, 25][Math.floor(Math.random()*2)];
        curHeals.sup = [45, 52][Math.floor(Math.random()*2)];
        curHeals.hyp = [71, 73, 77, 79][Math.floor(Math.random()*4)];
        document.getElementById('val-reg').innerText = `+${curHeals.reg}`;
        document.getElementById('val-sup').innerText = `+${curHeals.sup}`;
        document.getElementById('val-hyp').innerText = `+${curHeals.hyp}`;
    }

    async function startGame(lvl) {
        initAudio(); difficulty = lvl; rollHeals(); document.getElementById('overlay').style.display = 'none'; document.getElementById('arena').style.opacity = '1';
        playerTeam = await Promise.all([4, 7, 1].map(id => fetchPoke(id)));
        oppTeam = await Promise.all([150, 149, 144].map(id => fetchPoke(id)));
        updateUI(); nextTurn();
    }

    async function fetchPoke(id) {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`); const d = await res.json();
        return { name: d.name.toUpperCase(), img: d.sprites.other['official-artwork'].front_default, hp: 200, max: 200, bg: typeBgs[d.types[0].type.name] || "#778ca3" };
    }

    function generateMoves() {
        const getD = () => difficulty === 'easy' ? (Math.floor(Math.random()*5)+5)*10 : (difficulty === 'medium' ? Math.floor(Math.random()*15)*5+50 : Math.floor(Math.random()*40)+50);
        let d1 = getD(), d2 = getD(); while(d1 === d2) d2 = getD();
        const getM = () => { return { icon: icons[Math.floor(Math.random()*icons.length)], name: pre[Math.floor(Math.random()*pre.length)] + " " + suf[Math.floor(Math.random()*suf.length)] }; };
        let m1 = getM(), m2 = getM(); while(m1.icon === m2.icon) m2 = getM();
        return [{...m1, dmg: d1}, {...m2, dmg: d2}];
    }

    function updateUI() {
        if(!playerTeam[pIdx] || !oppTeam[oIdx]) return;
        const p = playerTeam[pIdx], o = oppTeam[oIdx];
        document.getElementById('p-name').innerText = p.name; document.getElementById('p-img').src = p.img; document.getElementById('p-card').style.backgroundColor = p.bg;
        document.getElementById('o-name').innerText = o.name; document.getElementById('o-img').src = o.img; document.getElementById('o-card').style.backgroundColor = o.bg;
        [...document.getElementById('p-team').children].forEach((b, i) => b.className = i < pIdx ? 'ball-proper spent' : 'ball-proper');
        [...document.getElementById('o-team').children].forEach((b, i) => b.className = i < oIdx ? 'ball-proper spent' : 'ball-proper');
        refreshBars();
    }

    function refreshBars() { ['p', 'o'].forEach(s => { const u = s === 'p' ? playerTeam[pIdx] : oppTeam[oIdx]; if(u) { document.getElementById(`${s}-fill`).style.width = (u.hp/u.max*100) + '%'; document.getElementById(`${s}-hp-text`).innerText = Math.ceil(u.hp); } }); }
    
    function nextTurn() {
        if(!playerTeam[pIdx] || !oppTeam[oIdx]) return;
        const p = playerTeam[pIdx], o = oppTeam[oIdx]; const pm = generateMoves(), om = generateMoves(); p.moves = pm; o.moves = om;
        const m = pm[Math.floor(Math.random()*2)]; gameState.currentMove = m; gameState.answer = Math.max(0, o.hp - m.dmg);
        document.getElementById('p-moves').innerHTML = pm.map(x => `<div class="move-row"><span>${x.icon} ${x.name}</span><span>-${x.dmg}</span></div>`).join('');
        document.getElementById('o-moves').innerHTML = om.map(x => `<div class="move-row"><span>${x.icon} ${x.name}</span><span>-${x.dmg}</span></div>`).join('');
        const qText = `${p.name} uses ${m.icon} ${m.name}! How much HP does ${o.name} have left?`;
        document.getElementById('question').innerText = qText;
        document.getElementById('sum-v1').innerText = Math.ceil(o.hp); document.getElementById('sum-v2').innerText = m.dmg; document.getElementById('sum-op').innerText = "-";
        gameState.mode = 'atk'; speak(qText); startTimer();
    }

    function press(n) { playSfx([440], 'square', 0.05); document.getElementById('display-answer').innerText += n; }
    function clearAns() { document.getElementById('display-answer').innerText = ""; }

    function submit() {
        clearInterval(timerId); const p = playerTeam[pIdx], o = oppTeam[oIdx]; const val = parseInt(document.getElementById('display-answer').innerText);
        const pCard = document.getElementById('p-card'), oCard = document.getElementById('o-card');

        // Check if correct (supports capped healing math)
        let isCorrect = (gameState.mode === 'atk') ? (val === gameState.answer) : (val === gameState.answer || val === gameState.rawHealingResult);

        if (isCorrect) {
            playSfx([523, 659, 783], 'sine', 0.15);
            if (gameState.mode === 'atk') {
                pCard.classList.add('lunge-right');
                setTimeout(() => { 
                    triggerImpact(); o.hp = Math.max(0, o.hp - gameState.currentMove.dmg); oCard.classList.add('damage-shake'); pCard.classList.remove('lunge-right'); 
                    if (o.hp <= 0) { setTimeout(() => handleKO('o'), 400); return; }
                    finishTurn();
                }, 150);
            } else { 
                p.hp = Math.min(p.max, (gameState.mode === 'heal' ? gameState.rawHealingResult : val)); 
                finishTurn();
            }
        } else {
            playSfx([110, 80], 'square', 0.2); oCard.classList.add('lunge-left');
            setTimeout(() => { 
                triggerImpact(); p.hp = Math.max(0, p.hp - 50); pCard.classList.add('damage-shake'); oCard.classList.remove('lunge-left'); 
                if (p.hp <= 0) { setTimeout(() => handleKO('p'), 400); return; }
                finishTurn();
            }, 150);
        }
    }

    function finishTurn() { setTimeout(() => { document.getElementById('p-card').classList.remove('damage-shake'); document.getElementById('o-card').classList.remove('damage-shake'); updateUI(); clearAns(); nextTurn(); }, 600); }

    function useHeal(potionName) {
        const p = playerTeam[pIdx]; gameState.mode = 'heal'; 
        let amt = (potionName === 'Hyper Potion') ? curHeals.hyp : (potionName === 'Super Potion' ? curHeals.sup : curHeals.reg);
        
        gameState.rawHealingResult = p.hp + amt;
        gameState.answer = Math.min(p.max, p.hp + amt);

        const qText = `Using ${potionName}, how much HP does ${p.name} have now?`;
        document.getElementById('question').innerText = qText;
        document.getElementById('sum-v1').innerText = Math.ceil(p.hp); document.getElementById('sum-v2').innerText = amt; document.getElementById('sum-op').innerText = "+";
        speak(qText); startTimer();
    }

    function handleKO(side) {
        const card = document.getElementById(`${side}-card`);
        card.classList.remove('damage-shake'); card.classList.add('fainted');
        setTimeout(() => { 
            if(side === 'o') oIdx++; else pIdx++;
            rollHeals();
            if(oIdx > 2 || pIdx > 2) showFinal(oIdx > 2);
            else { card.classList.remove('fainted'); updateUI(); clearAns(); nextTurn(); }
        }, 800);
    }

    function showFinal(win) {
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('end-title').innerText = win ? "CHAMPION!" : "SO CLOSE!";
        document.getElementById('end-msg').innerText = win ? "Amazing work! You are a Math Master!" : "Don't give up! Keep training!";
        if(win) { playSfx([523, 659, 783, 1046], 'sine'); for(let i=0; i<15; i++) setTimeout(() => { const f = document.createElement('div'); f.className = 'firework'; f.style.left = Math.random() * 100 + 'vw'; f.style.top = Math.random() * 100 + 'vh'; f.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`; document.body.appendChild(f); setTimeout(() => f.remove(), 1000); }, i * 200); }
    }
    function startTimer() { timeLeft = 20; clearInterval(timerId); timerId = setInterval(() => { timeLeft -= 0.1; document.getElementById('timer-fill').style.width = (timeLeft/20*100) + '%'; if(timeLeft <= 0) { clearInterval(timerId); submit(); } }, 100); }
</script>
</body>
</html>
