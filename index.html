<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PokeMaths">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/ultra-ball.png">
    <title>PokeMaths V18</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-main: 'Baloo 2', 'Arial Rounded MT Bold', sans-serif; --font-title: 'Luckiest Guy', cursive;
            --poke-yellow: #ffcb05; --poke-blue: #3d7dca; --pokedex-red: #dc0a2d; --card-gold: #ffd700;
            --type-p1: #ff8a50; --type-p2: #c62828; --type-o1: #9fa8da; --type-o2: #283593;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(180deg, #4b8fe0 0%, #2a5da8 100%); color: #fff; height: 100vh; height: 100dvh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }

        /* ---------- OVERLAYS ---------- */
        #overlay, #end-screen { position: fixed; inset: 0; background: #3d7dca; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 15px; overflow: hidden; }
        #sunburst { position: absolute; width: 250%; height: 250%; background: repeating-conic-gradient(from 0deg, #3d7dca 0deg 20deg, #4b8fe0 20deg 40deg); animation: rotateSun 24s linear infinite; opacity: 0.7; }
        .float-ball { position: absolute; width: 42px; height: 42px; border-radius: 50%; border: 3px solid #222; background: linear-gradient(#ff3b3b 48%, #222 48%, #222 55%, #fff 55%); animation: floatBall 6s ease-in-out infinite; opacity: .85; }
        .float-ball::after { content:''; position:absolute; width: 11px; height: 11px; background:#fff; border: 3px solid #222; border-radius:50%; top:50%; left:50%; transform: translate(-50%,-50%); }
        .big-logo { position: relative; z-index: 5; font-family: var(--font-title); font-size: clamp(44px, 14vw, 90px); color: var(--poke-yellow); -webkit-text-stroke: 2px var(--poke-blue); filter: drop-shadow(0 7px 0 var(--poke-blue)); letter-spacing: 2px; animation: logoBounce 2.4s ease-in-out infinite; margin-bottom: 6px; }
        .tagline { position: relative; z-index: 5; font-weight: 800; font-size: 17px; color: #eaf4ff; text-shadow: 0 2px 3px rgba(0,0,0,.3); margin-bottom: 18px; }
        .diff-row { position: relative; z-index: 5; display: flex; justify-content: center; gap: 12px; width: 100%; max-width: 500px; }
        .diff-card { flex: 1; background: linear-gradient(#ffffff, #f2ecdc); color: #333; padding: 14px 5px 12px; border-radius: 18px; border: 4px solid var(--poke-yellow); display: flex; flex-direction: column; align-items: center; cursor: pointer; box-shadow: 0 6px 0 #d4a017; font-family: var(--font-title); font-size: 18px; transition: transform .1s; }
        .diff-card:active { transform: translateY(4px); box-shadow: 0 2px 0 #d4a017; }
        .diff-card img { width: 100%; max-width: 78px; height: auto; pointer-events: none; filter: drop-shadow(0 4px 4px rgba(0,0,0,.3)); }
        .diff-sub { font-family: var(--font-main); font-weight: 800; font-size: 11px; color: #777; margin-top: 2px; }
        #end-screen h1 { position: relative; z-index: 5; font-family: var(--font-title); font-size: 3.2rem; color: var(--poke-yellow); text-shadow: 4px 4px #2a75bb; }
        #end-screen p { position: relative; z-index: 5; font-size: 1.3rem; margin: 12px 0 22px; font-weight: 800; }
        .end-btn { position: relative; z-index: 5; width: 250px; padding: 15px; border: 4px solid #fff; border-radius: 18px; font-family: var(--font-main); font-weight: 800; font-size: 18px; cursor: pointer; margin-top: 10px; color: #fff; }
        .btn-green { background: linear-gradient(#5ec96a, #3e9a49); box-shadow: 0 5px 0 #1b5e20; }
        .btn-blue { background: linear-gradient(#54a7f5, #2a6fc4); box-shadow: 0 5px 0 #174a8b; }
        #end-parade { position: relative; z-index: 5; display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
        #end-parade img { width: 52px; height: 52px; image-rendering: pixelated; filter: drop-shadow(0 3px 3px rgba(0,0,0,.35)); }

        /* ---------- TOP CORNER BUTTONS ---------- */
        .corner-btn { position: fixed; top: calc(env(safe-area-inset-top, 8px) + 6px); z-index: 1500; width: 46px; height: 46px; border-radius: 50%; border: 4px solid #333; cursor: pointer; transition: transform .12s; }
        .corner-btn:active { transform: scale(.88); }
        #home-btn { left: 12px; background: linear-gradient(#fff, #dfe6ee); display: flex; align-items: center; justify-content: center; }
        #home-btn svg { width: 24px; height: 24px; fill: #333; }
        #dex-btn { right: 12px; background: white; overflow: hidden; }
        #dex-btn::before { content: ''; width: 100%; height: 5px; background: #333; position: absolute; top: 50%; left: 0; transform: translateY(-50%); z-index: 1; }
        #dex-btn::after { content: ''; width: 100%; height: 50%; background: #ff0000; position: absolute; top: 0; border-bottom: 3px solid #333; }
        #dex-btn div { width: 12px; height: 12px; background: white; border: 3px solid #333; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }

        /* ---------- ARENA & CARDS ---------- */
        #arena { height: 33vh; display: flex; justify-content: center; align-items: stretch; gap: 8px; padding: 6px 6px 2px; opacity: 0; transition: opacity 0.5s; }
        .card-slot { flex: 1; max-width: 280px; display: flex; flex-direction: column; }
        .team-tracker { display: flex; justify-content: center; gap: 6px; margin-bottom: 4px; height: 22px; flex-shrink: 0; }
        .ball-proper { width: 20px; height: 20px; background: white; border-radius: 50%; border: 2px solid #333; position: relative; overflow: hidden; }
        .ball-proper::before { content: ""; position: absolute; top: 0; width: 100%; height: 50%; background: #eb4d4b; border-bottom: 2px solid #333; }
        .ball-proper.spent { filter: grayscale(1) brightness(0.25); opacity: 0.5; }

        .card { flex: 1; display: flex; flex-direction: column; border-radius: 16px; padding: 6px; border: 6px solid transparent; position: relative; overflow: hidden; transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); min-height: 0; }
        #p-card { background: linear-gradient(175deg, #fffef6, #fdf6dc) padding-box, linear-gradient(140deg, var(--type-p1), var(--card-gold) 30%, var(--type-p2) 65%, var(--card-gold)) border-box; box-shadow: 0 6px 18px rgba(0,0,0,.4); }
        #o-card { background: linear-gradient(175deg, #fffef6, #fdf6dc) padding-box, linear-gradient(140deg, var(--type-o1), var(--card-gold) 30%, var(--type-o2) 65%, var(--card-gold)) border-box; box-shadow: 0 6px 18px rgba(0,0,0,.4); }

        .hp-header { display: flex; justify-content: space-between; align-items: center; gap: 4px; flex-shrink: 0; margin-bottom: 3px; }
        .name-badge { display: flex; align-items: center; gap: 4px; min-width: 0; }
        .energy-orb { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(0,0,0,.35); box-shadow: 0 1px 2px rgba(0,0,0,.3); }
        #p-card .energy-orb { background: radial-gradient(circle at 32% 28%, rgba(255,255,255,.95), var(--type-p1) 45%, var(--type-p2) 95%); }
        #o-card .energy-orb { background: radial-gradient(circle at 32% 28%, rgba(255,255,255,.95), var(--type-o1) 45%, var(--type-o2) 95%); }
        .pokemon-name { font-family: var(--font-title); font-size: 0.62rem; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-top: 2px; }
        .tcg-hp-text { font-family: var(--font-title); font-size: 0.8rem; color: #c62828; flex-shrink: 0; }
        .hp-bar-outer { width: 100%; height: 10px; background: #222; border-radius: 6px; border: 1.5px solid #000; overflow: hidden; flex-shrink: 0; position: relative; }
        .hp-bar-inner { height: 100%; width: 100%; background: #2ecc71; transition: width 0.5s, background 0.5s; }
        .hp-bar-outer::after { content:''; position:absolute; top:1px; left:3px; right:3px; height:3px; border-radius:2px; background:rgba(255,255,255,.35); }

        .image-window { flex: 1; min-height: 0; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 3px 0; border: 2px solid rgba(0,0,0,.5); position: relative; overflow: hidden; background: #dfe9f5; }
        .backdrop { position: absolute; inset: 0; }
        .image-window::after { content: ''; position: absolute; inset: -20%; z-index: 7; pointer-events: none; background: linear-gradient(115deg, transparent 32%, rgba(255,255,255,.45) 45%, rgba(150,220,255,.30) 50%, rgba(255,190,250,.22) 55%, transparent 68%); transform: translateX(-130%) skewX(-8deg); animation: holoSweep 5s ease-in-out infinite; }
        .pokemon-img { max-height: 92%; max-width: 92%; object-fit: contain; position: relative; z-index: 5; filter: drop-shadow(0 4px 5px rgba(0,0,0,.4)); }
        .weakened { opacity: 0.65; filter: grayscale(0.8) drop-shadow(0 4px 5px rgba(0,0,0,.4)) !important; }

        .move-list { flex-shrink: 0; background: rgba(0,0,0,0.82); padding: 4px 7px; border-radius: 9px; border: 1.5px solid rgba(255,255,255,.7); min-height: 36px; display: flex; flex-direction: column; justify-content: center; gap: 2px; }
        .move-row { display: flex; justify-content: space-between; align-items: center; color: #fff; font-weight: 800; font-size: 0.6rem; }
        .move-dmg { font-family: var(--font-title); color: var(--poke-yellow); font-size: 0.68rem; }

        /* ---------- TIMER / QUESTION ---------- */
        #timer-container { width: 94%; height: 12px; background: #222; margin: 4px auto; border-radius: 10px; border: 2px solid #fff; overflow: hidden; flex-shrink: 0; }
        #timer-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #00e5ff, #00ffcc); transition: background .3s; }
        #question-area { height: 15vh; display: flex; align-items: stretch; justify-content: center; padding: 4px 8px; gap: 8px; }
        #question { flex: 2; background: linear-gradient(#ffffff, #f2ecdc); border: 4px solid #d4a017; border-radius: 16px; display: flex; align-items: center; justify-content: center; padding: 6px 10px; color: #333; font-size: 0.92rem; text-align: center; font-weight: 800; line-height: 1.25; }
        #sum-box { flex: 0 0 118px; background: linear-gradient(#333, #111); border: 3px solid #fff; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.7rem; color: var(--poke-yellow); position: relative; font-family: var(--font-title); box-shadow: 0 3px 8px rgba(0,0,0,.35); }
        .sum-symbol { position: absolute; left: 12px; color: #ff7043; font-size: 1.9rem; font-family: var(--font-title); }
        #sum-box .sum-line { display: flex; width: 100%; justify-content: flex-end; padding-right: 16px; line-height: 1.15; }

        /* ---------- CONTROLS ---------- */
        #controls-area { flex: 1; background: linear-gradient(180deg, #0984e3 0%, #2367a3 100%); border-top: 5px solid var(--poke-yellow); display: flex; flex-direction: row; align-items: stretch; justify-content: center; padding: 10px 10px calc(env(safe-area-inset-bottom, 8px) + 8px); border-radius: 25px 25px 0 0; gap: 10px; min-height: 0; }
        #potion-belt { display: flex; flex-direction: column; gap: 8px; width: 100px; flex-shrink: 0; }
        .potion-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; border-radius: 16px; border: 3px solid #fff; color: white; text-align: center; box-shadow: 0 4px 0 rgba(0,0,0,0.35); cursor: pointer; transition: transform .1s; padding: 3px 0; }
        .potion-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.35); }
        .p-reg { background: linear-gradient(#b06ad0, #8e44ad); } .p-super { background: linear-gradient(#ffd54f, #eba800); } .p-hyper { background: linear-gradient(#f75d90, #d81b60); }
        .potion-btn img { width: 42px; height: 42px; image-rendering: pixelated; filter: drop-shadow(0 2px 2px rgba(0,0,0,.4)); pointer-events: none; }
        .potion-text { font-size: 0.55rem; font-weight: 800; letter-spacing: .3px; text-shadow: 0 1px 2px rgba(0,0,0,.4); }
        .p-super .potion-text { color: #5d4300; text-shadow: none; }
        .potion-val { font-family: var(--font-title); font-size: 0.8rem; color: #fff; text-shadow: 1px 1px #000; }
        .p-super .potion-val { color: #5d4300; text-shadow: none; }

        #numpad-wrapper { flex: 1; display: flex; flex-direction: column; max-width: 450px; min-height: 0; }
        #display-answer { background: #fff; font-size: 1.8rem; width: 100%; border-radius: 12px; height: 44px; color: #000; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 3px solid #d4a017; margin-bottom: 7px; flex-shrink: 0; }
        .pad-and-submit { display: flex; flex-direction: row; flex: 1; gap: 10px; min-height: 0; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; flex: 3; }
        .num-btn { background: linear-gradient(#ffffff, #e8ecf2); border: none; border-radius: 14px; font-size: 1.55rem; font-weight: 800; font-family: var(--font-main); color: #2f3640; cursor: pointer; box-shadow: 0 4px 0 #a9b4c0; transition: transform .06s; }
        .num-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #a9b4c0; }
        .btn-submit { flex: 1.2; background: linear-gradient(#f2655f, #d63a30); border-radius: 20px; border: 5px solid white; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 0 #a02015; transition: transform .08s; }
        .btn-submit:active { transform: translateY(4px); box-shadow: 0 2px 0 #a02015; }
        .pokeball-icon { width: 52px; height: 52px; background: white; border-radius: 50%; border: 3.5px solid #333; position: relative; overflow: hidden; animation: pulsePoke 2s infinite; }
        .pokeball-icon::before { content: ""; position: absolute; top: 0; width: 100%; height: 50%; background: #eb4d4b; border-bottom: 3.5px solid #333; }
        .pokeball-icon::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 16px; height: 14px; background: white; border: 3.5px solid #333; border-radius: 50%; z-index: 2; }

        /* ---------- BATTLE FX ---------- */
        #fx-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1800; }
        #hit-flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1900; }
        .active-flash { animation: flashEffect 0.3s ease-out forwards; }
        .lunge-right { transform: translateX(60px) scale(1.12) rotate(4deg) !important; }
        .lunge-left { transform: translateX(-60px) scale(1.12) rotate(-4deg) !important; }
        .damage-shake { animation: shakeFx 0.4s; }
        .fainted { animation: faintFx 0.8s ease-in forwards; }
        .dmg-pop { position: fixed; z-index: 1950; font-family: var(--font-title); font-size: 30px; pointer-events: none; animation: dmgFloat 1s ease-out forwards; text-shadow: 2px 2px 0 rgba(0,0,0,.5); }
        #toast { position: fixed; top: 18%; left: 50%; transform: translateX(-50%) scale(0); z-index: 1960; background: linear-gradient(#333, #111); color: var(--poke-yellow); font-family: var(--font-title); font-size: 22px; padding: 12px 26px 8px; border-radius: 18px; border: 3px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,.4); pointer-events: none; white-space: nowrap; }
        #toast.show { animation: toastPop 1.6s ease forwards; }
        #catch-ball { position: fixed; z-index: 1970; width: 54px; height: 54px; border-radius: 50%; border: 4px solid #222; background: linear-gradient(#ff3b3b 46%, #222 46%, #222 56%, #fff 56%); display: none; }
        #catch-ball::after { content:''; position:absolute; width: 13px; height: 13px; background:#fff; border: 4px solid #222; border-radius:50%; top:50%; left:50%; transform: translate(-50%,-50%); }
        #catch-ball.wobbling { animation: ballWobble 1.5s ease-in-out; }

        /* ---------- POKEDEX & MODALS ---------- */
        #pokedex-view { position: fixed; inset: 0; padding: calc(env(safe-area-inset-top, 15px) + 5px) 20px 0; background: var(--pokedex-red); z-index: 2100; display: none; flex-direction: column; color: white; }
        #pokedex-list { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 10px; padding: 18px 0; }
        .dex-entry { background: rgba(255,255,255,0.14); border-radius: 12px; padding: 5px 3px; text-align: center; }
        .dex-entry img { width: 52px; height: 52px; image-rendering: pixelated; }
        .dex-entry.locked img { filter: brightness(0); opacity: 0.5; }
        .dex-name { font-size: 8.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .3px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .dex-entry.locked .dex-name { opacity: .45; }
        #dex-footer { padding: 10px 0 calc(env(safe-area-inset-bottom, 10px) + 8px); border-top: 2px solid white; display: flex; justify-content: center; }
        #dex-reset { width: 56px; height: 56px; background: #ff4422; border: 4px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .modal-shell { position: fixed; inset: 0; z-index: 2300; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,.7); }
        .confirm-box { background: #fff; color: #333; border-radius: 24px; border: 6px solid var(--pokedex-red); max-width: 320px; width: 85%; padding: 22px 20px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,.5); }
        .confirm-box h3 { font-family: var(--font-title); margin: 0 0 10px; font-size: 24px; color: var(--pokedex-red); }
        .confirm-box p { margin: 0 0 18px; font-size: 15px; font-weight: 700; }
        .confirm-row { display: flex; gap: 12px; justify-content: center; }
        .confirm-btn { flex: 1; padding: 12px 8px; border-radius: 14px; border: 3px solid; font-weight: 800; font-size: 15px; cursor: pointer; font-family: var(--font-main); }
        .btn-cancel { background: #fff; border-color: #999; color: #555; }
        .btn-danger { background: var(--pokedex-red); border-color: #8b0000; color: #fff; }

        @keyframes rotateSun { to { transform: rotate(360deg); } }
        @keyframes logoBounce { 0%, 100% { transform: translateY(0) rotate(-1.5deg); } 50% { transform: translateY(-9px) rotate(1.5deg); } }
        @keyframes floatBall { 0%, 100% { transform: translateY(0) rotate(-8deg); } 50% { transform: translateY(-22px) rotate(8deg); } }
        @keyframes holoSweep { 0%, 55% { transform: translateX(-130%) skewX(-8deg); } 85%, 100% { transform: translateX(130%) skewX(-8deg); } }
        @keyframes shakeFx { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-16px); } 75% { transform: translateX(16px); } }
        @keyframes faintFx { 100% { transform: translateY(500px) rotate(45deg); opacity: 0; } }
        @keyframes flashEffect { 0% { opacity: 0.8; } 100% { opacity: 0; } }
        @keyframes pulsePoke { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes dmgFloat { 0% { transform: translateY(0) scale(.6); opacity: 0; } 15% { opacity: 1; transform: translateY(-8px) scale(1.15); } 100% { transform: translateY(-70px) scale(1); opacity: 0; } }
        @keyframes toastPop { 0% { transform: translateX(-50%) scale(0); } 12% { transform: translateX(-50%) scale(1.08); } 20%, 80% { transform: translateX(-50%) scale(1); } 100% { transform: translateX(-50%) scale(0); opacity: 0; } }
        @keyframes ballWobble { 0%, 100% { transform: rotate(0); } 15% { transform: rotate(-22deg); } 30% { transform: rotate(20deg); } 45% { transform: rotate(-16deg); } 60% { transform: rotate(14deg); } 75% { transform: rotate(-8deg); } 90% { transform: rotate(6deg); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; } }
    </style>
</head>
<body>
    <div id="hit-flash"></div>
    <canvas id="fx-canvas"></canvas>
    <div id="toast"></div>
    <div id="catch-ball"></div>

    <div id="overlay">
        <div id="sunburst"></div>
        <div class="float-ball" style="top:10%; left:8%;"></div>
        <div class="float-ball" style="top:72%; left:82%; animation-delay:-2s;"></div>
        <div class="float-ball" style="top:80%; left:12%; animation-delay:-4s; width:30px; height:30px;"></div>
        <h1 class="big-logo">PokeMaths</h1>
        <div class="tagline">Battle with your brain!</div>
        <div class="diff-row">
            <div class="diff-card" onclick="startGame('easy')"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png" alt="Charmander">EASY<div class="diff-sub">No timer!</div></div>
            <div class="diff-card" onclick="startGame('medium')"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/5.png" alt="Charmeleon">MEDIUM<div class="diff-sub">Beat the clock</div></div>
            <div class="diff-card" onclick="startGame('hard')"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png" alt="Charizard">HARD<div class="diff-sub">Tricky sums!</div></div>
        </div>
    </div>

    <div id="end-screen" style="display:none;">
        <div id="sunburst2" style="position:absolute; width:250%; height:250%; background: repeating-conic-gradient(from 0deg, #3d7dca 0deg 20deg, #4b8fe0 20deg 40deg); animation: rotateSun 24s linear infinite; opacity:0.7;"></div>
        <h1 id="end-title"></h1>
        <p id="end-msg"></p>
        <div id="end-parade"></div>
        <button class="end-btn btn-green" onclick="rematch()">BATTLE AGAIN!</button>
        <button class="end-btn btn-blue" onclick="goHome()">CHANGE DIFFICULTY</button>
    </div>

    <div id="home-btn" class="corner-btn" onclick="goHome()" style="display:none;"><svg viewBox="0 0 24 24"><path d="M10 19l-7-7 7-7v4h8a3 3 0 0 1 3 3v5h-3v-4a1 1 0 0 0-1-1h-7v7z"/></svg></div>
    <div id="dex-btn" class="corner-btn" onclick="openDex()" style="display:none;"><div></div></div>

    <div id="pokedex-view">

        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime + start);
        if (glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, audioCtx.currentTime + start + dur);
        g.gain.setValueAtTime(vol, audioCtx.currentTime + start);
        g.gain.exponentialRampToValueAtTime(0.0005, audioCtx.currentTime + start + dur);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(audioCtx.currentTime + start); o.stop(audioCtx.currentTime + start + dur + 0.05);
    }
    function playSfx(type) {
        if (type === 'press') tone(440, 0, .06, 'square', .05);
        if (type === 'chime') { tone(523, 0, .15, 'triangle', .12); tone(659, .08, .15, 'triangle', .12); tone(784, .16, .25, 'triangle', .12); }
        if (type === 'wrong') { tone(300, 0, .18, 'sawtooth', .08, 180); tone(180, .16, .3, 'sawtooth', .08, 100); }
        if (type === 'whoosh') tone(220, 0, .32, 'sawtooth', .09, 950);
        if (type === 'impact') { tone(90, 0, .22, 'square', .16, 45); tone(55, .02, .28, 'sine', .18, 30); }
        if (type === 'faint') { [420, 320, 230, 140].forEach((f, i) => tone(f, i * .18, .26, 'square', .07)); }
        if (type === 'heal') { tone(660, 0, .2, 'sine', .1); tone(880, .12, .25, 'sine', .1); tone(1100, .24, .3, 'sine', .08); }
        if (type === 'throw') tone(500, 0, .25, 'sine', .08, 900);
        if (type === 'click') tone(1500, 0, .08, 'square', .07);
        if (type === 'gotcha') { const m = [[523,0],[659,.12],[784,.24],[1046,.4]]; m.forEach(([f,t]) => tone(f, t, .28, 'triangle', .12)); }
        if (type === 'flee') { tone(600, 0, .2, 'sine', .08, 300); tone(300, .18, .3, 'sine', .08, 150); }
        if (type === 'fanfare') { const m = [[523,0],[523,.14],[523,.28],[659,.42],[784,.62],[659,.82],[1046,.98]]; m.forEach(([f,t]) => { tone(f, t, .3, 'triangle', .12); tone(f/2, t, .3, 'square', .04); }); }
    }

    /* ================= PARTICLE FX ================= */
    const canvas = document.getElementById('fx-canvas'), ctx = canvas.getContext('2d');
    let particles = [], projectiles = [];
    function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', initCanvas); initCanvas();
    function drawStar(c, x, y, r, rot) {
        c.beginPath();
        for (let i = 0; i < 10; i++) { const rad = i % 2 === 0 ? r : r * .45, a = rot + Math.PI * i / 5; c[i === 0 ? 'moveTo' : 'lineTo'](x + Math.cos(a) * rad, y + Math.sin(a) * rad); }
        c.closePath(); c.fill();
    }
    function burst(x, y, colors, count = 16, speed = 6) {
        for (let i = 0; i < count; i++) {
            const a = Math.random() * Math.PI * 2, sp = speed * (.4 + Math.random() * .8);
            particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1.5, c: colors[i % colors.length], l: 1, g: .2, s: 4 + Math.random() * 4, rot: Math.random() * 6, vr: (Math.random() - .5) * .3 });
        }
    }
    function riseSparkles(el, color) {
        const r = el.getBoundingClientRect();
        for (let i = 0; i < 14; i++) particles.push({ x: r.left + Math.random() * r.width, y: r.bottom - Math.random() * 20, vx: (Math.random() - .5) * 1.2, vy: -2 - Math.random() * 2.5, c: color, l: 1, g: -0.02, s: 3 + Math.random() * 3, rot: 0, vr: .15 });
    }
    function centerOf(el) { const r = el.getBoundingClientRect(); return { x: r.left + r.width / 2, y: r.top + r.height / 2 }; }
    function fireProjectile(fromEl, toEl, color, onHit) {
        const a = centerOf(fromEl), b = centerOf(toEl);
        projectiles.push({ x: a.x, y: a.y, sx: a.x, sy: a.y, tx: b.x, ty: b.y, t: 0, c: color, onHit });
        playSfx('whoosh');
    }
    function animateFX() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const pr of projectiles) {
            pr.t += 0.07;
            const t = Math.min(1, pr.t), arc = -70 * Math.sin(Math.PI * t);
            pr.x = pr.sx + (pr.tx - pr.sx) * t; pr.y = pr.sy + (pr.ty - pr.sy) * t + arc;
            particles.push({ x: pr.x, y: pr.y, vx: (Math.random() - .5), vy: (Math.random() - .5), c: pr.c, l: .6, g: 0, s: 3, rot: 0, vr: .2 });
            ctx.globalAlpha = 1; ctx.fillStyle = pr.c; ctx.shadowColor = pr.c; ctx.shadowBlur = 18;
            ctx.beginPath(); ctx.arc(pr.x, pr.y, 11, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(pr.x - 3, pr.y - 3, 4, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            if (t >= 1 && pr.onHit) { const cb = pr.onHit; pr.onHit = null; pr.done = true; cb(); }
        }
        projectiles = projectiles.filter(p => !p.done);
        for (const p of particles) {
            p.vy += p.g; p.x += p.vx; p.y += p.vy; p.l -= .022; p.rot += p.vr;
            ctx.globalAlpha = Math.max(0, Math.min(1, p.l)); ctx.fillStyle = p.c;
            drawStar(ctx, p.x, p.y, p.s, p.rot);
        }
        ctx.globalAlpha = 1;
        particles = particles.filter(p => p.l > 0);
        requestAnimationFrame(animateFX);
    }
    animateFX();
    function triggerImpact() { const f = document.getElementById('hit-flash'); f.classList.remove('active-flash'); void f.offsetWidth; f.classList.add('active-flash'); }
    function damagePopup(el, txt, color) {
        const c = centerOf(el), d = document.createElement('div');
        d.className = 'dmg-pop'; d.innerText = txt; d.style.color = color;
        d.style.left = (c.x - 30) + 'px'; d.style.top = (c.y - 30) + 'px';
        document.body.appendChild(d); setTimeout(() => d.remove(), 1000);
    }
    function showToast(txt) { const t = document.getElementById('toast'); t.innerText = txt; t.classList.remove('show'); void t.offsetWidth; t.classList.add('show'); }

    /* ================= SUM GENERATION (never negative) ================= */
    function rollDamage() {
        if (difficulty === 'easy') return (Math.floor(Math.random() * 5) + 5) * 10;          // 50-90, tens
        if (difficulty === 'medium') return Math.floor(Math.random() * 15) * 5 + 50;          // 50-120, fives
        return Math.floor(Math.random() * 40) + 50;                                           // 50-89, any
    }
    function pickTurnMoves(mon, maxDmg) {
        const picked = [...mon.moves].sort(() => Math.random() - .5).slice(0, 2);
        let d1 = rollDamage(), d2 = rollDamage(), guard = 0;
        while (d1 === d2 && guard++ < 20) d2 = rollDamage();
        return picked.map(([name, type], i) => ({ name, icon: T[type] || "⭐", dmg: Math.max(1, Math.min(i === 0 ? d1 : d2, maxDmg)) }));
    }
    function catchSum() {
        let a, b;
        if (difficulty === 'easy') { a = (Math.floor(Math.random() * 5) + 1) * 10; b = (Math.floor(Math.random() * 4) + 1) * 10; }
        else if (difficulty === 'medium') { a = Math.floor(Math.random() * 39) + 11; b = Math.floor(Math.random() * 39) + 11; }
        else { a = Math.floor(Math.random() * 64) + 25; b = Math.floor(Math.random() * 64) + 25; }
        return { a, b, ans: a + b };
    }

    /* ================= BATTLE FLOW ================= */
    function applyCardTheme(side, type) {
        const th = typeThemes[type] || typeThemes.normal;
        document.documentElement.style.setProperty(`--type-${side}1`, th.c1);
        document.documentElement.style.setProperty(`--type-${side}2`, th.c2);
        document.getElementById(`${side}-backdrop`).innerHTML = backdropSVGs[type] || backdropSVGs.normal;
    }
    function makeUnit(r) { return { ...r, img: ART(r.id), hp: 200, max: 200 }; }
    function pickTeams() {
        const pool = [...roster].sort(() => Math.random() - .5);
        playerTeam = pool.slice(0, 3).map(makeUnit);
        oppTeam = pool.slice(3, 6).map(makeUnit);
    }

    function startGame(lvl) {
        initAudio(); difficulty = lvl;
        document.getElementById('timer-container').style.display = (lvl === 'easy') ? 'none' : 'block';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('home-btn').style.display = 'flex';
        document.getElementById('dex-btn').style.display = 'block';
        document.getElementById('arena').style.opacity = '1';
        pIdx = 0; oIdx = 0; caughtThisBattle = []; rollHeals(); pickTeams();
        clearAns(); updateUI(); nextTurn();
    }
    function rematch() { startGame(difficulty); }
    function goHome() {
        clearInterval(timerId); if (synth) synth.cancel();
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('home-btn').style.display = 'none';
        document.getElementById('dex-btn').style.display = 'none';
        document.getElementById('arena').style.opacity = '0';
        document.getElementById('question').innerText = 'Ready?';
        ['sum-v1','sum-v2','sum-op'].forEach(id => document.getElementById(id).innerText = '');
        clearAns();
    }

    function rollHeals() {
        curHeals.reg = [20, 25][Math.floor(Math.random() * 2)];
        curHeals.sup = [45, 52][Math.floor(Math.random() * 2)];
        curHeals.hyp = [71, 73, 77, 79][Math.floor(Math.random() * 4)];
        document.getElementById('val-reg').innerText = `+${curHeals.reg}`;
        document.getElementById('val-sup').innerText = `+${curHeals.sup}`;
        document.getElementById('val-hyp').innerText = `+${curHeals.hyp}`;
    }

    function updateUI() {
        if (!playerTeam[pIdx] || !oppTeam[oIdx]) return;
        const p = playerTeam[pIdx], o = oppTeam[oIdx];
        document.getElementById('p-name').innerText = p.name; document.getElementById('o-name').innerText = o.name;
        const pi = document.getElementById('p-img'), oi = document.getElementById('o-img');
        safeImg(pi, SPRITE_SM(p.id)); safeImg(oi, SPRITE_SM(o.id));
        pi.src = p.img; oi.src = o.img;
        pi.classList.remove('weakened'); oi.classList.remove('weakened');
        applyCardTheme('p', p.type); applyCardTheme('o', o.type);
        [...document.getElementById('p-team').children].forEach((b, i) => b.className = i < pIdx ? 'ball-proper spent' : 'ball-proper');
        [...document.getElementById('o-team').children].forEach((b, i) => b.className = i < oIdx ? 'ball-proper spent' : 'ball-proper');
        refreshBars();
    }
    function refreshBars() {
        ['p', 'o'].forEach(s => {
            const u = s === 'p' ? playerTeam[pIdx] : oppTeam[oIdx]; if (!u) return;
            const pct = u.hp / u.max * 100;
            const fill = document.getElementById(`${s}-fill`);
            fill.style.width = pct + '%';
            fill.style.background = pct > 50 ? '#2ecc71' : (pct > 20 ? '#f1c40f' : '#e74c3c');
            document.getElementById(`${s}-hp-text`).innerText = Math.ceil(u.hp) + ' HP';
        });
    }
    function renderMoves(side, moves) {
        document.getElementById(`${side}-moves`).innerHTML = moves.map(m => `<div class="move-row"><span>${m.icon} ${m.name.toUpperCase()}</span><span class="move-dmg">${m.dmg}</span></div>`).join('');
    }

    function nextTurn() {
        if (!playerTeam[pIdx] || !oppTeam[oIdx]) return;
        const p = playerTeam[pIdx], o = oppTeam[oIdx];
        const pm = pickTurnMoves(p, o.hp);   // player's damage never exceeds opponent HP -> answer never below zero
        const om = pickTurnMoves(o, p.hp);
        p.moves2 = pm; o.moves2 = om;
        const m = pm[Math.floor(Math.random() * 2)];
        gameState.currentMove = m; gameState.mode = 'atk'; gameState.answer = o.hp - m.dmg;
        renderMoves('p', pm); renderMoves('o', om);
        const qText = `${p.name} uses ${m.icon} ${m.name}! How much HP does ${o.name} have left?`;
        document.getElementById('question').innerText = qText;
        document.getElementById('sum-v1').innerText = o.hp; document.getElementById('sum-v2').innerText = m.dmg; document.getElementById('sum-op').innerText = "−";
        speak(`${p.name} uses ${m.name}! How much HP does ${o.name} have left?`);
        startTimer();
    }

    function useHeal(potionName) {
        if (gameState.mode === 'catch') return; // don't interrupt a catch
        const p = playerTeam[pIdx]; if (!p) return;
        initAudio(); gameState.mode = 'heal';
        const amt = potionName === 'Hyper Potion' ? curHeals.hyp : (potionName === 'Super Potion' ? curHeals.sup : curHeals.reg);
        gameState.rawHealingResult = p.hp + amt;
        gameState.answer = Math.min(p.max, p.hp + amt);
        const qText = `Using the ${potionName}, how much HP does ${p.name} have now?`;
        document.getElementById('question').innerText = qText;
        document.getElementById('sum-v1').innerText = p.hp; document.getElementById('sum-v2').innerText = amt; document.getElementById('sum-op').innerText = "+";
        speak(qText); startTimer();
    }

    function press(n) { playSfx('press'); const d = document.getElementById('display-answer'); if (d.innerText.length < 4) d.innerText += n; }
    function clearAns() { document.getElementById('display-answer').innerText = ""; }

    function submit() {
        if (gameState.currentMove === null && gameState.mode === 'atk') return;
        clearInterval(timerId);
        const p = playerTeam[pIdx], o = oppTeam[oIdx];
        const val = parseInt(document.getElementById('display-answer').innerText);
        const pCard = document.getElementById('p-card'), oCard = document.getElementById('o-card');
        const pTheme = typeThemes[p.type] || typeThemes.normal, oTheme = typeThemes[o.type] || typeThemes.normal;

        if (gameState.mode === 'catch') { resolveCatch(val === gameState.answer); return; }

        const isCorrect = (gameState.mode === 'atk') ? (val === gameState.answer) : (val === gameState.answer || val === gameState.rawHealingResult);

        if (isCorrect) {
            playSfx('chime');
            if (gameState.mode === 'atk') {
                const dmg = gameState.currentMove.dmg;
                gameState.currentMove = null; // guard against double submit
                pCard.classList.add('lunge-right');
                fireProjectile(pCard, oCard, pTheme.c1, () => {
                    triggerImpact(); playSfx('impact');
                    const c = centerOf(oCard); burst(c.x, c.y, [pTheme.c1, '#fff', '#ffe97a']);
                    damagePopup(oCard, `-${dmg}`, '#ff5252');
                    o.hp = Math.max(0, o.hp - dmg);
                    oCard.classList.add('damage-shake'); pCard.classList.remove('lunge-right');
                    refreshBars();
                    if (o.hp <= 0) { setTimeout(() => handleKO('o'), 400); return; }
                    finishTurn();
                });
            } else {
                p.hp = Math.min(p.max, gameState.rawHealingResult);
                playSfx('heal'); riseSparkles(pCard, '#7dff9b');
                damagePopup(pCard, `+`, '#4caf50');
                finishTurn();
            }
        } else {
            playSfx('wrong');
            const counter = (o.moves2 || [{ name: 'Tackle', icon: '⭐', dmg: 50 }])[Math.floor(Math.random() * 2)];
            gameState.currentMove = null;
            showToast(`${o.name} fights back!`);
            oCard.classList.add('lunge-left');
            fireProjectile(oCard, pCard, oTheme.c2, () => {
                triggerImpact(); playSfx('impact');
                const c = centerOf(pCard); burst(c.x, c.y, [oTheme.c2, '#fff']);
                damagePopup(pCard, `-${counter.dmg}`, '#ff5252');
                p.hp = Math.max(0, p.hp - counter.dmg);
                pCard.classList.add('damage-shake'); oCard.classList.remove('lunge-left');
                refreshBars();
                if (p.hp <= 0) { setTimeout(() => handleKO('p'), 400); return; }
                finishTurn();
            });
        }
    }

    function finishTurn() {
        setTimeout(() => {
            document.getElementById('p-card').classList.remove('damage-shake');
            document.getElementById('o-card').classList.remove('damage-shake');
            updateUI(); clearAns(); nextTurn();
        }, 650);
    }

    /* ================= KO & CATCH ================= */
    function handleKO(side) {
        const card = document.getElementById(`${side}-card`);
        card.classList.remove('damage-shake');
        playSfx('faint');
        document.getElementById(`${side}-img`).classList.add('fainted');
        setTimeout(() => {
            document.getElementById(`${side}-img`).classList.remove('fainted');
            if (side === 'o') {
                const beaten = oppTeam[oIdx];
                if (!dex.includes(beaten.id)) startCatch(beaten);
                else { showToast(`${beaten.name} is already in your Pokédex!`); setTimeout(proceedAfterOppKO, 1400); }
            } else {
                pIdx++; rollHeals();
                if (pIdx > 2) showFinal(false);
                else { updateUI(); clearAns(); nextTurn(); }
            }
        }, 850);
    }

    function startCatch(target) {
        gameState.mode = 'catch'; gameState.catchTarget = target;
        const img = document.getElementById('o-img');
        img.src = target.img; img.classList.add('weakened');
        const s = catchSum(); gameState.answer = s.ans;
        const qText = `${target.name} is weak! Solve the sum to catch it!`;
        document.getElementById('question').innerText = qText;
        document.getElementById('sum-v1').innerText = s.a; document.getElementById('sum-v2').innerText = s.b; document.getElementById('sum-op').innerText = "+";
        clearAns(); speak(qText); startTimer();
    }

    function resolveCatch(success) {
        const oCard = document.getElementById('o-card'), ball = document.getElementById('catch-ball');
        const c = centerOf(oCard);
        gameState.mode = 'idle';
        playSfx('throw');
        ball.style.display = 'block';
        ball.style.left = (c.x - 27) + 'px'; ball.style.top = (window.innerHeight - 80) + 'px';
        ball.style.transition = 'top .45s cubic-bezier(.2,.7,.4,1), left .45s ease';
        requestAnimationFrame(() => { ball.style.top = (c.y - 27) + 'px'; });
        setTimeout(() => {
            document.getElementById('o-img').style.opacity = '0';
            triggerImpact(); playSfx('click');
            ball.classList.add('wobbling');
            setTimeout(() => {
                ball.classList.remove('wobbling');
                const target = gameState.catchTarget;
                if (success) {
                    playSfx('gotcha'); burst(c.x, c.y, ['#ffe97a', '#fff', '#8cf0ff'], 26, 7);
                    showToast(`GOTCHA! ${target.name} was caught!`);
                    speak(`Gotcha! ${target.name} was caught!`);
                    if (!dex.includes(target.id)) { dex.push(target.id); localStorage.setItem('pmaths_dex_v1', JSON.stringify(dex)); }
                    caughtThisBattle.push(target.id);
                } else {
                    playSfx('flee'); burst(c.x, c.y, ['#b0bec5', '#fff'], 14, 5);
                    showToast(`Oh no! ${target.name} got away!`);
                    speak(`Oh no! ${target.name} broke free and ran away!`);
                }
                ball.style.display = 'none'; ball.style.transition = 'none';
                document.getElementById('o-img').style.opacity = '1';
                setTimeout(proceedAfterOppKO, 1500);
            }, 1600);
        }, 500);
    }

    function proceedAfterOppKO() {
        gameState.catchTarget = null;
        oIdx++; rollHeals();
        if (oIdx > 2) showFinal(true);
        else { updateUI(); clearAns(); nextTurn(); }
    }

    /* ================= END / TIMER ================= */
    function showFinal(win) {
        clearInterval(timerId);
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('end-title').innerText = win ? "CHAMPION!" : "SO CLOSE!";
        const nCaught = caughtThisBattle.length;
        document.getElementById('end-msg').innerText = win
            ? (nCaught ? `You're a Maths Master — and you caught ${nCaught} new Pokémon!` : "Amazing work! You're a Maths Master!")
            : "Don't give up! Keep training!";
        const parade = document.getElementById('end-parade'); parade.innerHTML = '';
        caughtThisBattle.forEach(id => {
            const img = document.createElement('img'); safeImg(img, ART(id)); img.src = SPRITE_SM(id); parade.appendChild(img);
        });
        if (win) { playSfx('fanfare'); speak(nCaught ? `Champion! And you caught ${nCaught} new pokemon!` : "Champion! Amazing work!");
            for (let i = 0; i < 10; i++) setTimeout(() => burst(Math.random() * canvas.width, Math.random() * canvas.height * .5, [`hsl(${Math.random()*360},100%,65%)`, '#fff'], 20, 7), i * 300);
        } else speak("So close! Don't give up, keep training!");
    }

    function startTimer() {
        clearInterval(timerId);
        if (difficulty === 'easy') return; // no timer on easy - take all the time you need
        timeLeft = 20;
        const fill = document.getElementById('timer-fill');
        fill.style.width = '100%';
        timerId = setInterval(() => {
            timeLeft -= 0.1;
            fill.style.width = Math.max(0, timeLeft / 20 * 100) + '%';
            fill.style.background = timeLeft > 8 ? 'linear-gradient(90deg,#00e5ff,#00ffcc)' : 'linear-gradient(90deg,#ff8a65,#ff5252)';
            if (timeLeft <= 0) { clearInterval(timerId); submit(); }
        }, 100);
    }

    /* ================= POKEDEX ================= */
    function openDex() {
        const list = document.getElementById('pokedex-list');
        let htmlStr = '', count = 0;
        roster.forEach(r => {
            const found = dex.includes(r.id); if (found) count++;
            htmlStr += `<div class="dex-entry ${found ? '' : 'locked'}"><img loading="lazy" decoding="async" alt="${r.name}"><span class="dex-name">${found ? r.name : '???'}</span></div>`;
        });
        list.innerHTML = htmlStr;
        list.querySelectorAll('img').forEach((img, i) => { safeImg(img, ART(roster[i].id)); img.src = SPRITE_SM(roster[i].id); });
        document.getElementById('dex-title').innerText = `CAUGHT: ${count}/${roster.length}`;
        document.getElementById('pokedex-view').style.display = 'flex';
    }
    function closeDex() { document.getElementById('pokedex-view').style.display = 'none'; }
    function askReset() {
        document.getElementById('confirm-msg').innerText = `All ${dex.length} of your caught Pokémon will be released back into the wild!`;
        document.getElementById('confirm-modal').style.display = 'flex';
    }
    function closeConfirm() { document.getElementById('confirm-modal').style.display = 'none'; }
    function doReset() { localStorage.removeItem('pmaths_dex_v1'); dex = []; closeConfirm(); openDex(); }
</script>
