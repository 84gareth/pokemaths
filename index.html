<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PokeMaths">
    
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/great-ball.png">
    
    <title>PokeMaths</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Sniglet&display=swap" rel="stylesheet">
    <style>
        :root { --font-main: 'Sniglet', cursive; --font-title: 'Luckiest Guy', cursive; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background: #1e3799; color: #fff; height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }

        /* OVERLAYS */
        #overlay, #result-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 15px; }
        .diff-row { display: flex; justify-content: center; gap: 8px; width: 100%; max-width: 450px; margin-top: 10px; }
        .diff-card { flex: 1; background: #fff; color: #333; padding: 10px 5px; border-radius: 15px; border: 4px solid #ffcb05; display: flex; flex-direction: column; align-items: center; box-shadow: 0 5px 0 #d4a017; cursor: pointer; }
        .diff-card img { width: 100%; max-width: 65px; height: auto; }

        /* ARENA & TRACKER */
        #arena { height: 35vh; display: flex; justify-content: center; align-items: stretch; gap: 8px; padding: 5px; opacity: 0; transition: opacity 0.5s; }
        .card-slot { flex: 1; max-width: 280px; display: flex; flex-direction: column; }
        .team-tracker { display: flex; justify-content: center; gap: 6px; margin-bottom: 4px; height: 24px; }
        .ball-proper { width: 22px; height: 22px; background: white; border-radius: 50%; border: 2px solid #333; position: relative; overflow: hidden; box-shadow: 0 3px 6px rgba(0,0,0,0.4); }
        .ball-proper::before { content: ""; position: absolute; top: 0; width: 100%; height: 50%; background: #eb4d4b; border-bottom: 2px solid #333; }
        .ball-proper::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 6px; height: 6px; background: white; border: 1.5px solid #333; border-radius: 50%; z-index: 2; }
        .ball-proper.spent { filter: grayscale(1) brightness(0.2); opacity: 0.5; }

        /* CARD HEADER (TCG STYLE) */
        .card { flex: 1; display: flex; flex-direction: column; border-radius: 12px; padding: 4px; border: 4px solid #f1c40f; background: #fff; position: relative; overflow: hidden; transition: transform 0.2s, background-color 0.5s; }
        .tcg-hp-container { flex-shrink: 0; display: flex; flex-direction: column; background: rgba(0,0,0,0.85); border-radius: 8px; padding: 4px 8px; border: 1.5px solid #fff; margin-bottom: 2px; }
        .hp-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .pokemon-name { font-family: var(--font-title); font-size: 0.7rem; color: #ffcb05; text-shadow: 1px 1px #000; }
        .tcg-hp-text { font-family: 'Arial Black', sans-serif; font-size: 0.95rem; color: #fff; }
        .hp-bar-outer { width: 100%; height: 10px; background: #333; border-radius: 5px; border: 1px solid #fff; overflow: hidden; margin-top: 2px; }
        .hp-bar-inner { height: 100%; width: 100%; background: #2ecc71; transition: width 0.8s; }
        
        .image-window { flex: 1; min-height: 0; background: rgba(255,255,255,0.8); border-radius: 6px; display: flex; align-items: center; justify-content: center; margin: 2px 0; border: 1px solid #333; }
        .pokemon-img { max-height: 95%; max-width: 95%; object-fit: contain; }
        .move-list { flex-shrink: 0; background: rgba(0,0,0,0.8); padding: 4px 6px; border-radius: 8px; border: 1px solid #fff; min-height: 38px; }
        .move-row { display: flex; justify-content: space-between; color: #fff; font-weight: bold; font-size: 0.58rem; }

        /* CONTROLS (HORIZONTAL SIDE-BY-SIDE) */
        #controls-area { height: 46vh; background: linear-gradient(180deg, #0984e3 0%, #2980b9 100%); border-top: 5px solid #f1c40f; display: flex; flex-direction: row; align-items: stretch; justify-content: center; padding: 10px; border-radius: 25px 25px 0 0; gap: 10px; padding-bottom: env(safe-area-inset-bottom); }
        
        #potion-belt { display: flex; flex-direction: column; gap: 8px; width: 95px; flex-shrink: 0; }
        .potion-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; border: 3px solid #fff; color: white; text-align: center; box-shadow: 0 4px 0 rgba(0,0,0,0.3); cursor: pointer; }
        .p-reg { background: #9b59b6; } .p-super { background: #f1c40f; color: #333; } .p-hyper { background: #e91e63; }

        #numpad-wrapper { flex: 1; display: flex; flex-direction: column; max-width: 450px; }
        #display-answer { background: #fff; font-size: 1.8rem; width: 100%; border-radius: 8px; height: 42px; color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid #f39c12; margin-bottom: 6px; }
        
        .pad-and-submit { display: flex; flex-direction: row; flex: 1; gap: 10px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; flex: 3; }
        .num-btn { background: #f5f6fa; border: none; border-radius: 12px; font-size: 1.6rem; font-weight: bold; box-shadow: 0 4.5px 0 #bdc3c7; color: #2f3640; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .btn-submit { flex: 1.2; background: #eb4d4b; border-radius: 20px; border: 5px solid white; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 0 #c0392b; }
        .pokeball-icon { width: 52px; height: 52px; background: white; border-radius: 50%; border: 3.5px solid #333; position: relative; overflow: hidden; animation: pulsePoke 2s infinite; }
        .pokeball-icon::before { content: ""; position: absolute; top: 0; width: 100%; height: 50%; background: #eb4d4b; border-bottom: 3.5px solid #333; }
        .pokeball-icon::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 16px; height: 14px; background: white; border: 3.5px solid #333; border-radius: 50%; z-index: 2; }

        @keyframes pulsePoke { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        #question-area { height: 16vh; display: flex; align-items: stretch; justify-content: center; padding: 4px; gap: 6px; }
        #question { flex: 2; background: #fff; border: 4px solid #444; border-radius: 15px; display: flex; align-items: center; justify-content: center; padding: 6px; }
        #question-text { color: #000 !important; font-size: 0.9rem; text-align: center; font-weight: 900; }
        #sum-box { flex: 0 0 115px; background: #fff; border: 4px solid #e74c3c; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Courier New', monospace; font-size: 1.8rem; color: #333; position: relative; }
        .sum-symbol { position: absolute; left: 10px; color: #e74c3c; font-size: 2rem; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="font-family: var(--font-title); font-size: 2.8rem; color: #ffcb05; text-shadow: 4px 4px #2a75bb;">POKEMATHS</h1>
        <div class="diff-row">
            <div class="diff-card" onclick="startGame('easy')"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png"><h3>EASY</h3></div>
            <div class="diff-card" onclick="startGame('medium')"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/5.png"><h3>MED</h3></div>
            <div class="diff-card" onclick="startGame('hard')"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png"><h3>HARD</h3></div>
        </div>
    </div>

    <div id="fx-layer" style="position: absolute; inset: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; z-index: 1000;"></div>
    <div id="arena">
        <div class="card-slot">
            <div id="p-team-tracker" class="team-tracker"><div class="ball-proper"></div><div class="ball-proper"></div><div class="ball-proper"></div></div>
            <div class="card" id="p-card">
                <div class="tcg-hp-container"><div class="hp-header"><span class="pokemon-name" id="p-name">---</span><span class="tcg-hp-text" id="p-hp-text">250</span></div><div class="hp-bar-outer"><div id="p-fill" class="hp-bar-inner"></div></div></div>
                <div class="image-window"><img id="p-img" class="pokemon-img"></div>
                <div id="p-moves" class="move-list"></div>
            </div>
        </div>
        <div class="card-slot">
            <div id="o-team-tracker" class="team-tracker"><div class="ball-proper"></div><div class="ball-proper"></div><div class="ball-proper"></div></div>
            <div class="card" id="o-card">
                <div class="tcg-hp-container"><div class="hp-header"><span class="pokemon-name" id="o-name">---</span><span class="tcg-hp-text" id="o-hp-text">250</span></div><div class="hp-bar-outer"><div id="o-fill" class="hp-bar-inner"></div></div></div>
                <div class="image-window"><img id="o-img" class="pokemon-img"></div>
                <div id="o-moves" class="move-list"></div>
            </div>
        </div>
    </div>
    <div id="timer-container" style="width: 95%; height: 14px; background: #222; margin: 4px auto; border-radius: 10px; border: 2px solid #fff; overflow: hidden;"><div id="timer-fill" style="height: 100%; width: 100%; background: #00ffcc; transition: width 0.1s linear;"></div></div>
    <div id="question-area">
        <div id="question"><div id="question-text">Ready?</div></div>
        <div id="sum-box"><span class="sum-symbol" id="sum-op"></span><div style="display:flex; width:100%; justify-content:flex-end; padding-right:15px; letter-spacing:2px;"><span id="sum-v1">---</span></div><div style="display:flex; width:100%; justify-content:flex-end; padding-right:15px; letter-spacing:2px;"><span id="sum-v2">---</span></div><div style="width: 80%; height: 3px; background: #333; margin: 2px 0;"></div></div>
    </div>
    <div id="controls-area">
        <div id="potion-belt">
            <div class="potion-btn p-reg" onclick="useHeal('potion')"><div class="potion-text">POTION</div></div>
            <div class="potion-btn p-super" onclick="useHeal('super potion')"><div class="potion-text">SUPER</div></div>
            <div class="potion-btn p-hyper" onclick="useHeal('hyper potion')"><div class="potion-text">HYPER</div></div>
        </div>
        <div id="numpad-wrapper">
            <div id="display-answer"></div>
            <div class="pad-and-submit">
                <div class="numpad">
                    <button class="num-btn" onclick="press(1)">1</button><button class="num-btn" onclick="press(2)">2</button><button class="num-btn" onclick="press(3)">3</button>
                    <button class="num-btn" onclick="press(4)">4</button><button class="num-btn" onclick="press(5)">5</button><button class="num-btn" onclick="press(6)">6</button>
                    <button class="num-btn" onclick="press(7)">7</button><button class="num-btn" onclick="press(8)">8</button><button class="num-btn" onclick="press(9)">9</button>
                    <button class="num-btn" onclick="clearAns()" style="background:#7f8c8d; color:#fff">C</button><button class="num-btn" onclick="press(0)">0</button>
                </div>
                <div onclick="submit()" class="btn-submit"><div class="pokeball-icon"></div></div>
            </div>
        </div>
    </div>

<script>
    let audioCtx, voice = window.speechSynthesis, audioUnlocked = false, timerId, difficulty, score = 0, timeLeft = 20;
    const icons = ["🔥", "💧", "🌿", "⚡", "👁️", "🐲", "👊", "❄️", "🌑", "🐝"];
    const pre = ["THUNDER", "FIRE", "HYDRO", "MYSTIC", "SOLAR", "DRAGON", "ICE", "SHADOW", "IRON", "QUICK"];
    const suf = ["BLAST", "PUNCH", "SLASH", "BEAM", "STRIKE", "KICK", "WAVE", "STORM", "CRUSH", "BOLT"];
    const typeBgs = { fire: "#eb3b5a", water: "#4b7bec", grass: "#20bf6b", electric: "#f7b731", psychic: "#a55eea", dragon: "#8854d0", ice: "#45aaf2", bug: "#26de81" };
    const phonetics = { "RAYQUAZA": "Ray quay zah", "MEWTWO": "Mew two", "KYOGRE": "Ky ogre", "MIRAIDON": "Me rye don", "GHOLDENGO": "Gold en go" };
    let playerTeam = [], oppTeam = [], pIndex = 0, oIndex = 0, gameState = { active: false, mode: 'attack', answer: 0, altAnswer: null };
    function initAudio() { if (!audioUnlocked) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioUnlocked = true; voice.speak(new SpeechSynthesisUtterance("")); } }
    function playSfx(type) { if (!audioUnlocked) return; const now = audioCtx.currentTime; if (type === 'hit') { [660, 880, 1100].forEach((f, i) => { const o = audioCtx.createOscillator(); const gn = audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(f, now+(i*0.08)); gn.gain.setValueAtTime(0.1, now+(i*0.08)); gn.gain.exponentialRampToValueAtTime(0.0001, now+(i*0.08)+0.2); o.connect(gn); gn.connect(audioCtx.destination); o.start(now+(i*0.08)); o.stop(now+(i*0.08)+0.2); }); } else if (type === 'press') { const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); osc.type='square'; osc.frequency.setValueAtTime(600, now); g.gain.setValueAtTime(0.05, now); g.gain.linearRampToValueAtTime(0, now+0.05); osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(now+0.05); } }
    function speak(txt) { if (audioUnlocked) { voice.cancel(); let spokenTxt = txt; Object.keys(phonetics).forEach(name => { spokenTxt = spokenTxt.replace(new RegExp(name, 'gi'), phonetics[name]); }); const msg = new SpeechSynthesisUtterance(spokenTxt); msg.rate = 0.95; voice.speak(msg); } }
    async function startGame(lvl) { initAudio(); difficulty = lvl; score = 0; pIndex = 0; oIndex = 0; document.getElementById('overlay').style.display = 'none'; const getValidId = () => Math.floor(Math.random() * 151) + 1; playerTeam = await Promise.all([getValidId(), getValidId(), getValidId()].map(id => fetchPoke(id))); oppTeam = await Promise.all([getValidId(), getValidId(), getValidId()].map(id => fetchPoke(id))); gameState.active = true; updateUI(); nextTurn(); }
    async function fetchPoke(id) { const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`); const d = await res.json(); const baseHP = (difficulty === 'easy') ? 150 : 200; return { name: d.name.toUpperCase(), img: d.sprites.other['official-artwork'].front_default, hp: baseHP, max: baseHP, bg: typeBgs[d.types[0].type.name] || "#778ca3", moves: [] }; }
    function updateUI() { const p = playerTeam[pIndex], o = oppTeam[oIndex]; if (!p || !o) return; const getR = (a) => a[Math.floor(Math.random()*a.length)]; const getV = () => (difficulty === 'easy') ? (Math.floor(Math.random()*3)+2)*10 : (Math.floor(Math.random()*20)+30); if (!p.moves.length) p.moves = [{icon: getR(icons), name: `${getR(pre)} ${getR(suf)}`, dmg: getV()}, {icon: getR(icons), name: `${getR(pre)} ${getR(suf)}`, dmg: getV() + 5}]; document.getElementById(`p-name`).innerText = p.name; document.getElementById(`p-img`).src = p.img; document.getElementById(`o-name`).innerText = o.name; document.getElementById(`o-img`).src = o.img; const pB = document.getElementById('p-team-tracker').children; const oB = document.getElementById('o-team-tracker').children; for(let i=0; i<3; i++) { pB[i].className = i < pIndex ? 'ball-proper spent' : 'ball-proper'; oB[i].className = i < oIndex ? 'ball-proper spent' : 'ball-proper'; } updateHPBars(); }
    function nextTurn() { if (!gameState.active) return; gameState.mode = 'attack'; const p = playerTeam[pIndex], o = oppTeam[oIndex]; const m = p.moves[Math.floor(Math.random()*2)]; gameState.currentMove = m; gameState.answer = Math.max(0, o.hp - m.dmg); const qStr = `${p.name} uses ${m.name}. How much HP does ${o.name} have left?`; document.getElementById('question-text').innerText = qStr; document.getElementById('sum-v1').innerText = o.hp; document.getElementById('sum-v2').innerText = m.dmg; document.getElementById('sum-op').innerText = "-"; speak(qStr); resetTimer(); }
    function useHeal(type) { if(!gameState.active || gameState.mode === 'heal') return; playSfx('press'); const p = playerTeam[pIndex]; gameState.mode = 'heal'; let amt = (difficulty === 'easy') ? 30 : 55; gameState.answer = Math.min(p.max, p.hp + amt); const qStr = `Using ${type}. What is ${p.name}'s new HP?`; document.getElementById('question-text').innerText = qStr; document.getElementById('sum-v1').innerText = p.hp; document.getElementById('sum-v2').innerText = amt; document.getElementById('sum-op').innerText = "+"; speak(qStr); resetTimer(); }
    function press(n) { playSfx('press'); document.getElementById('display-answer').innerText += n; }
    function clearAns() { playSfx('press'); document.getElementById('display-answer').innerText = ""; }
    function submit() { if(!gameState.active) return; const p = playerTeam[pIndex], o = oppTeam[oIndex]; const val = parseInt(document.getElementById('display-answer').innerText); if(timerId) clearInterval(timerId); if(!isNaN(val) && val === gameState.answer) { score++; playSfx('hit'); if(gameState.mode === 'attack') { o.hp = Math.max(0, o.hp - gameState.currentMove.dmg); if(o.hp <= 0) { oIndex++; if(oIndex > 2) return showEnd(true); } } else { p.hp = gameState.answer; } } else { p.hp = Math.max(0, p.hp - 30); if(p.hp <= 0) { pIndex++; if(pIndex > 2) return showEnd(false); } } updateUI(); clearAns(); setTimeout(nextTurn, 1500); }
    function showEnd(win) { gameState.active = false; alert(win ? "VICTORY!" : "DEFEAT"); location.reload(); }
    function updateHPBars() { ['p', 'o'].forEach(s => { const char = (s === 'p' ? playerTeam[pIndex] : oppTeam[oIndex]); const fill = document.getElementById(`${s}-fill`); const perc = (char.hp/char.max)*100; fill.style.width = perc + "%"; document.getElementById(`${s}-hp-text`).innerText = Math.ceil(char.hp); }); }
    function resetTimer() { timeLeft = 20; if(timerId) clearInterval(timerId); timerId = setInterval(() => { timeLeft -= 0.1; document.getElementById('timer-fill').style.width = (timeLeft/20)*100 + "%"; if(timeLeft <= 0) submit(); }, 100); }
</script>
</body>
</html>
